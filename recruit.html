<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>発電所見学申込 - 大友発電所</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="sub-page">
<button type="button" id="theme-toggle" class="theme-toggle" aria-label="テーマ切り替え">
    <span class="theme-sun" aria-hidden="true">☀</span>
    <span class="theme-moon" aria-hidden="true">☾</span>
</button>

<div class="site-shell">
    <header class="site-header">
        <a href="index.html" class="brand" aria-label="大友発電所 ホーム">
            <img src="logov2.png" alt="大友電力パワーグリッド 大友発電所">
        </a>

        <nav class="primary-nav" aria-label="主要メニュー">
            <a href="index.html">ホーム</a>
            <a href="index.html#food">食品館</a>
            <a href="recruit.html">発電所見学</a>
            <a href="https://x.com/pqUBnTUdVJ48094" target="_blank">お問い合わせ</a>
        </nav>
    </header>

    <main class="form-page">
        <section class="form-hero">
            <p class="eyebrow">大友発電所</p>
            <h1>発電所見学のお申し込み</h1>
            <p>個人・団体問わず、随時受け付けております。</p>
            <div class="countdown-inline">年末まで <strong id="year-countdown">計算中...</strong></div>
        </section>

        <section class="visit-form-panel">
            <form class="visit-form" action="https://formspree.io/f/mqengyaq" method="POST">
                <label>
                    お名前
                    <input type="text" name="name" autocomplete="name" required>
                </label>

                <label>
                    メールアドレス
                    <input type="email" name="email" autocomplete="email" required>
                </label>

                <label>
                    希望日
                    <input type="date" name="date" required>
                </label>

                <label>
                    人数
                    <input type="number" name="party_size" min="1" max="50" value="1" required>
                </label>

                <label class="full-field">
                    備考
                    <textarea name="message" rows="5" placeholder="見学したい内容、到着予定時間など"></textarea>
                </label>

                <input type="hidden" name="_subject" value="大友発電所 見学申込">
                <button class="button" type="submit">申込内容を送信</button>
            </form>

            <aside class="form-note">
                <h2>405の原因</h2>
                <p>我々大友電力グループは、社員一人一人に合わせた的確な発電方法を
                    教えています。</p>
            </aside>
        </section>
    </main>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const themeToggle = document.getElementById("theme-toggle");
    const form = document.querySelector(".visit-form");
    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    const savedTheme = localStorage.getItem("theme");

    function applyTheme(theme) {
        document.body.classList.toggle("dark-theme", theme === "dark");
    }

    applyTheme(savedTheme || (mediaQuery.matches ? "dark" : "light"));

    mediaQuery.addEventListener("change", (event) => {
        if (!localStorage.getItem("theme")) {
            applyTheme(event.matches ? "dark" : "light");
        }
    });

    themeToggle.addEventListener("click", () => {
        const nextTheme = document.body.classList.contains("dark-theme") ? "light" : "dark";
        localStorage.setItem("theme", nextTheme);
        applyTheme(nextTheme);
    });

    form.addEventListener("submit", (event) => {
        if (form.action.includes("FORM_ID_HERE")) {
            event.preventDefault();
            alert("必ず必要箇所は入力してください。");
        }
    });

    function updateCountdown() {
        const countdown = document.getElementById("year-countdown");
        const now = new Date();
        const end = new Date(now.getFullYear(), 11, 31, 23, 59, 59);
        const diff = Math.max(0, end - now);
        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        countdown.textContent = `あと${days}日${hours}時間`;
    }

    updateCountdown();
    setInterval(updateCountdown, 60000);
});
</script>
</body>
</html>
