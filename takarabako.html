<main class="support-page">
    <header class="support-header">
        <h1>宝箱タービン復興支援特設ページ</h1>
    </header>

    <section class="damage-report">
        <h2>被害状況について</h2>
        <div class="damage-grid">
            <div class="status-card">
                <h3>第1タービン</h3>
                <p class="status error">停止中 (致命的損傷)</p>
                <p>原因：ラーメンの汁、香水等の不純物混入</p>
            </div>
            <div class="status-card">
                <h3>第2タービン</h3>
                <p class="status error">停止中 (二次被害)</p>
                <p>原因：有害排気ガスによるシステムダウン</p>
            </div>
        </div>
    </section>

    <section class="donation-box">
        <h2>復興支援募金のお願い</h2>
        <p>皆さまの温かいご支援が、大友発電所のエネルギーを取り戻す力になります。お預かりした募金は全額、タービンの洗浄および環境改善、被害を受けた方々への支援に充てられます。</p>
        
        <div class="payment-methods">
            <button class="button">クレジットカードで支援</button>
            <button class="button ghost">銀行振込口座を表示</button>
        </div>
    </section>
</main>
