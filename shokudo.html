<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大友発電所 社員食堂メニュー</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --accent-color: #2c3e50;
            --card-bg: #ffffff;
            --text-main: #333;
            --price-color: #e67e22;
            --cost-color: #7f8c8d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .menu-container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 8px solid var(--accent-color);
        }

        header {
            background-color: #fff;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: bold;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--accent-color);
        }

        .menu-section {
            padding: 20px;
        }

        .category-title {
            font-size: 0.9rem;
            color: #fff;
            background: var(--accent-color);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px dashed #ddd;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
        }

        .item-cost {
            font-size: 0.85rem;
            color: var(--cost-color);
        }

        .item-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--price-color);
            white-space: nowrap;
        }

        .price-unit {
            font-size: 0.9rem;
            margin-left: 2px;
        }

        footer {
            background: #f9f9f9;
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #999;
        }

        /* 装飾的なアイコン風スタイル */
        .icon {
            margin-right: 10px;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

<div class="menu-container">
    <header>
        <div class="logo">OTOMO POWER PLANT</div>
        <h1>大友発電所 | 社員食堂</h1>
    </header>

    <div class="menu-section">
        <div class="category-title">麺類 / Noodles</div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">🍜 ラーメン</span>
                <span class="item-cost">[原価 200円]</span>
            </div>
            <div class="item-price">600<span class="price-unit">円</span></div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">🥢 カレーうどん</span>
                <span class="item-cost">[原価 250円]</span>
            </div>
            <div class="item-price">600<span class="price-unit">円</span></div>
        </div>
    </div>

    <div class="menu-section">
        <div class="category-title">丼・カレー / Bowl & Curry</div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">🍱 ソースカツ丼</span>
                <span class="item-cost">[原価 400円]</span>
            </div>
            <div class="item-price">800<span class="price-unit">円</span></div>
        </div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">🍛 カレー</span>
                <span class="item-cost">[原価 300円]</span>
            </div>
            <div class="item-price">700<span class="price-unit">円</span></div>
        </div>
    </div>

    <div class="menu-section">
        <div class="category-title">定食 / Set Meal</div>
        <div class="menu-item">
            <div class="item-info">
                <span class="item-name">🐟 焼き魚定食</span>
                <span class="item-cost">[原価 350円]</span>
            </div>
            <div class="item-price">700<span class="price-unit">円</span></div>
        </div>
    </div>

    <footer>
        ご利用ありがとうございます
    </footer>
</div>

</body>
</html>
