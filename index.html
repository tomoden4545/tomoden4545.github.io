<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<button type="button" id="theme-toggle" class="theme-toggle" aria-label="theme toggle">
    <span class="theme-icon theme-sun">&#9728;</span>
    <span class="theme-icon theme-moon">&#9790;</span>
</button>

<div class="layout">
    <div class="main-visual">
        <a href="https://tomoden4545.github.io/" class="title">
            <span>T</span>
            <span>O</span>
            <span>M</span>
            <span>O</span>
            <span>D</span>
            <span>E</span>
            <span>N</span>
        </a>

        <div class="menu-grid">
            <a href="recruit.html" class="menu-card">
                <span class="menu-icon">
                    <img src="shacho.png" alt="">
                </span>
                <strong>新卒採用</strong>
                <em>社長からのご案内 ↗</em>
            </a>

            <a href="shokuhinkan.html" class="menu-card">
                <span class="menu-icon">
                    <img src="ramen.jpg" alt="">
                </span>
                <strong>食品館</strong>
                <em>ラーメン一覧 ↗</em>
            </a>

            <a href="takarabako.html" class="menu-card">
                <span class="menu-icon menu-icon-text">宝</span>
                <strong>宝箱</strong>
                <em>令和８年度 ↗</em>
            </a>
        </div>

        <div class="time-calendar">
            <p id="clock"></p>
            <div id="calendar" class="calendar"></div>
        </div>

        <a href="https://x.com/pqUBnTUdVJ48094" target="_blank" class="twitter-btn">
            <span class="finger">&#128073;</span>
            <img src="twitter.png" alt="Twitter">
            公式Twitterはこちら
        </a>
    </div>
</div>

<script>
function updateClock() {
    const now = new Date();

    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");

    const hours = String(now.getHours()).padStart(2, "0");
    const minutes = String(now.getMinutes()).padStart(2, "0");
    const seconds = String(now.getSeconds()).padStart(2, "0");

    document.getElementById("clock").textContent =
        `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
}

function updateCalendar() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    const today = now.getDate();
    const weeks = ["日", "月", "火", "水", "木", "金", "土"];
    const calendar = document.getElementById("calendar");

    let html = `<div class="calendar-title">${year}/${String(month + 1).padStart(2, "0")}</div>`;
    html += `<div class="calendar-grid">`;

    weeks.forEach((week) => {
        html += `<span class="calendar-week">${week}</span>`;
    });

    for (let i = 0; i < firstDay; i++) {
        html += `<span></span>`;
    }

    for (let date = 1; date <= lastDate; date++) {
        const activeClass = date === today ? " is-today" : "";
        html += `<span class="calendar-day${activeClass}">${date}</span>`;
    }

    html += `</div>`;
    calendar.innerHTML = html;
}

function setupThemeToggle() {
    const button = document.getElementById("theme-toggle");
    const mediaQuery = window.matchMedia("(prefers-color-scheme: light)");

    function applyTheme(theme) {
        document.body.classList.toggle("light-theme", theme === "light");
    }

    const savedTheme = localStorage.getItem("theme");
    applyTheme(savedTheme || (mediaQuery.matches ? "light" : "dark"));

    button.addEventListener("click", () => {
        const nextTheme = document.body.classList.contains("light-theme") ? "dark" : "light";
        applyTheme(nextTheme);
        localStorage.setItem("theme", nextTheme);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    setInterval(updateClock, 1000);
    updateClock();
    updateCalendar();
    setupThemeToggle();
});
</script>

</body>
</html>
